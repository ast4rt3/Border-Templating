<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBSC SAS Border Templating System</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <main class="app-shell">
    <section class="workspace" aria-label="Template composer">
      <header class="topbar">
        <div class="brand-lockup">
          <span class="brand-mark">NB</span>
          <div>
            <p class="eyebrow">Campaign Photo Composer</p>
            <h1>NBSC SAS Border Templating System</h1>
          </div>
        </div>
        <button class="primary-action" id="downloadBtn" type="button" disabled>Download PNG</button>
      </header>

      <div class="composer">
        <aside class="controls" aria-label="Editor controls">
          <div class="panel-heading">
            <h2>Editor</h2>
            <span>1080 x 1080</span>
          </div>

          <label class="upload-card">
            <span class="upload-title">Upload photo</span>
            <span class="upload-status" id="photoStatus">No photo selected</span>
            <input id="photoInput" type="file" accept="image/*">
          </label>

          <div class="field-group">
            <label for="templateSelect">Border</label>
            <select id="templateSelect">
              <option value="">Add PNG files to assets/img/imgtemplate</option>
            </select>
          </div>

          <figure class="template-preview" aria-label="Selected template preview">
            <div class="template-preview-box">
              <img id="templatePreview" alt="Selected border preview">
              <span id="templatePreviewText">No border selected</span>
            </div>
            <figcaption>Selected template</figcaption>
          </figure>

          <div class="field-group">
            <label for="zoomRange">Zoom</label>
            <input id="zoomRange" type="range" min="0.5" max="3" step="0.01" value="1">
          </div>

          <div class="grid-fields">
            <label>
              X
              <input id="xOffset" type="number" value="0" step="1">
            </label>
            <label>
              Y
              <input id="yOffset" type="number" value="0" step="1">
            </label>
          </div>

          <div class="button-row">
            <button id="fitBtn" type="button">Fit</button>
            <button id="fillBtn" type="button">Fill</button>
            <button id="centerBtn" type="button">Center</button>
          </div>
        </aside>

        <section class="preview-panel" aria-label="Preview">
          <div class="preview-header">
            <div>
              <h2>Preview</h2>
              <span id="templateLabel">Template pending</span>
            </div>
            <span class="format-pill">PNG</span>
          </div>
          <div class="canvas-stage">
            <canvas id="previewCanvas" width="1080" height="1080"></canvas>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
</body>
</html>
